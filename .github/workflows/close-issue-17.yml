name: Close Issue 17

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/close-issue-17.yml
      - scripts/update_issue_17.py

permissions:
  issues: write
  contents: read

jobs:
  close-issue-17:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update and close issue #17
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/update_issue_17.py
