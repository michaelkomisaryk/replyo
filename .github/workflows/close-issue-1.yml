name: Close Issue 1

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/close-issue-1.yml
      - scripts/update_issue_1.py

permissions:
  issues: write
  contents: read

jobs:
  close-issue-1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update and close issue #1
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/update_issue_1.py
