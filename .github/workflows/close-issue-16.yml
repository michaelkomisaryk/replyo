name: Close Issue 16

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/close-issue-16.yml
      - scripts/update_issue_16.py

permissions:
  issues: write
  contents: read

jobs:
  close-issue-16:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update and close issue #16
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/update_issue_16.py
