name: Close Issue 4

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/close-issue-4.yml
      - scripts/update_issue_4.py

permissions:
  issues: write
  contents: read

jobs:
  close-issue-4:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update and close issue #4
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/update_issue_4.py
