name: Close Issue 7

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/close-issue-7.yml
      - scripts/update_issue_7.py

permissions:
  issues: write
  contents: read

jobs:
  close-issue-7:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update and close issue #7
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/update_issue_7.py
