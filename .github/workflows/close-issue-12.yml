name: Close Issue 12

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/close-issue-12.yml
      - scripts/update_issue_12.py

permissions:
  issues: write
  contents: read

jobs:
  close-issue-12:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update and close issue #12
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/update_issue_12.py
