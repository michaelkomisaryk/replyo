name: Close Issue 5

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/close-issue-5.yml
      - scripts/update_issue_5.py

permissions:
  issues: write
  contents: read

jobs:
  close-issue-5:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update and close issue #5
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/update_issue_5.py
