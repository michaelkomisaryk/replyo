name: Close Issue 11

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/close-issue-11.yml
      - scripts/update_issue_11.py

permissions:
  issues: write
  contents: read

jobs:
  close-issue-11:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update and close issue #11
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/update_issue_11.py
