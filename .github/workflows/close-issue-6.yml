name: Close Issue 6

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/close-issue-6.yml
      - scripts/update_issue_6.py

permissions:
  issues: write
  contents: read

jobs:
  close-issue-6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update and close issue #6
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/update_issue_6.py
