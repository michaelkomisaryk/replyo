name: Close Issue 13

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/close-issue-13.yml
      - scripts/update_issue_13.py

permissions:
  issues: write
  contents: read

jobs:
  close-issue-13:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update and close issue #13
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/update_issue_13.py
