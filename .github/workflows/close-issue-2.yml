name: Close Issue 2

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/close-issue-2.yml
      - scripts/update_issue_2.py

permissions:
  issues: write
  contents: read

jobs:
  close-issue-2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update and close issue #2
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/update_issue_2.py
