name: Close Issue 9

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/close-issue-9.yml
      - scripts/update_issue_9.py

permissions:
  issues: write
  contents: read

jobs:
  close-issue-9:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update and close issue #9
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/update_issue_9.py
