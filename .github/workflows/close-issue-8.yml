name: Close Issue 8

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/close-issue-8.yml
      - scripts/update_issue_8.py

permissions:
  issues: write
  contents: read

jobs:
  close-issue-8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update and close issue #8
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/update_issue_8.py
