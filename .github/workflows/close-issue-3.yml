name: Close Issue 3

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/close-issue-3.yml
      - scripts/update_issue_3.py

permissions:
  issues: write
  contents: read

jobs:
  close-issue-3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update and close issue #3
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/update_issue_3.py
